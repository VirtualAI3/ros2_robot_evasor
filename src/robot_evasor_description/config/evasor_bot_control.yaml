controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    wheelbase: 0.24
    traction_track_width: 0.24
    steering_track_width: 0.24
    traction_wheels_radius: 0.04
    steering_wheels_radius: 0.04
    reference_timeout: 2.0
    traction_joints_names: ['rl_wheel_joint', 'rr_wheel_joint']
    steering_joints_names: ['fl_steering_joint', 'fr_steering_joint']
    open_loop: false
    velocity_rolling_window_size: 10
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true
    twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    position_feedback: false
